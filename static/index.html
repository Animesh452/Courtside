<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courtside</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0c;
            --bg-chat: #111114;
            --bg-user-msg: #1a1a2e;
            --bg-bot-msg: #16161a;
            --accent: #e85d26;
            --accent-glow: rgba(232, 93, 38, 0.15);
            --text-primary: #e8e8ed;
            --text-secondary: #7a7a8c;
            --border: #222230;
            --input-bg: #16161a;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- Header ---- */
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .header span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* ---- Chat area ---- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* ---- Messages ---- */
        .message {
            max-width: 72%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: fadeIn 0.25s ease-out;
        }

        .message.user {
            align-self: flex-end;
            background: var(--bg-user-msg);
            border-bottom-right-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-bot-msg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.assistant .label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        /* ---- Typing indicator ---- */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0 4px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        /* ---- Welcome state ---- */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            opacity: 0.7;
        }

        .welcome h2 {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .welcome p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            max-width: 360px;
        }

        /* ---- Input area ---- */
        .input-area {
            padding: 16px 24px 24px 24px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .input-wrapper button {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .input-wrapper button:hover {
            opacity: 0.85;
        }

        .input-wrapper button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ---- Animations ---- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* ---- Mobile ---- */
        @media (max-width: 600px) {
            .message { max-width: 88%; }
            .header h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Courtside</h1>
        <span>AI Sports Assistant</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>Game time.</h2>
            <p>Ask about upcoming fights, race weekends, match results, or anything sports.</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Ask me anything about sports..." 
                autocomplete="off"
            />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        // Send on Enter key
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });

        // Focus the input on page load
        messageInput.focus();

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Hide welcome screen on first message
            if (welcome) welcome.remove();

            // Show user message
            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            const typingEl = addTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                    })
                });

                const data = await response.json();

                // Remove typing indicator and show reply
                typingEl.remove();
                addMessage(data.reply, 'assistant');
            } catch (error) {
                typingEl.remove();
                addMessage('Something went wrong. Make sure the server is running.', 'assistant');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            if (role === 'assistant') {
                div.innerHTML = `<div class="label">Courtside</div>${formatText(text)}`;
            } else {
                div.textContent = text;
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="label">Courtside</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // Basic text formatting — handles line breaks
        function formatText(text) {
            return text.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
